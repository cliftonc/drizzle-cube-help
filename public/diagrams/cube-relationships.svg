<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200">
  <defs>
    <style>
      .primary-cube { fill: #4caf50; stroke: #388e3c; stroke-width: 2; }
      .belongs-cube { fill: #2196f3; stroke: #1565c0; stroke-width: 2; }
      .has-many-cube { fill: #ff9800; stroke: #f57c00; stroke-width: 2; }
      .text { fill: white; font-family: Arial, sans-serif; font-size: 12px; text-anchor: middle; font-weight: bold; }
      .label { fill: #6b7280; font-family: Arial, sans-serif; font-size: 10px; text-anchor: middle; }
      .arrow { stroke: #6b7280; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .arrow-marker { fill: #6b7280; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow-marker"/>
    </marker>
  </defs>
  
  <!-- Employees (Primary) -->
  <rect x="250" y="80" width="100" height="40" rx="5" class="primary-cube"/>
  <text x="300" y="100" class="text">Employees</text>
  <text x="300" y="112" class="text">(PRIMARY)</text>
  
  <!-- Departments (belongsTo) -->
  <rect x="50" y="80" width="100" height="40" rx="5" class="belongs-cube"/>
  <text x="100" y="100" class="text">Departments</text>
  <text x="100" y="112" class="text">(belongsTo)</text>
  
  <!-- Productivity (hasMany) -->
  <rect x="450" y="80" width="100" height="40" rx="5" class="has-many-cube"/>
  <text x="500" y="100" class="text">Productivity</text>
  <text x="500" y="112" class="text">(hasMany)</text>
  
  <!-- Arrows -->
  <path d="M250 100 L150 100" class="arrow"/>
  <path d="M350 100 L450 100" class="arrow"/>
  
  <!-- Labels -->
  <text x="200" y="95" class="label">belongsTo</text>
  <text x="400" y="95" class="label">hasMany</text>
</svg>