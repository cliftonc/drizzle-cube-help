<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <defs>
    <style>
      .step-bg { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1; stroke-dasharray: 5,5; }
      .step-title { fill: #1f2937; font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; }
      .node { fill: #3b82f6; stroke: #1d4ed8; stroke-width: 2; }
      .cte-node { fill: #8b5cf6; stroke: #7c3aed; stroke-width: 2; }
      .result-node { fill: #10b981; stroke: #059669; stroke-width: 2; }
      .text { fill: white; font-family: Arial, sans-serif; font-size: 11px; text-anchor: middle; }
      .arrow { stroke: #6b7280; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .arrow-marker { fill: #6b7280; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow-marker"/>
    </marker>
  </defs>
  
  <!-- Step 1 Background -->
  <rect x="10" y="20" width="350" height="120" rx="10" class="step-bg"/>
  <text x="185" y="40" class="step-title">Step 1: Pre-aggregate hasMany data</text>
  
  <!-- Step 2 Background -->
  <rect x="400" y="20" width="380" height="120" rx="10" class="step-bg"/>
  <text x="590" y="40" class="step-title">Step 2: Join pre-aggregated data</text>
  
  <!-- Step 1 Nodes -->
  <rect x="30" y="60" width="120" height="50" rx="5" class="cte-node"/>
  <text x="90" y="82" class="text">Productivity CTE</text>
  <text x="90" y="95" class="text">GROUP BY employee_id</text>
  
  <rect x="200" y="60" width="140" height="50" rx="5" class="node"/>
  <text x="270" y="82" class="text">employee_id,</text>
  <text x="270" y="95" class="text">total_lines_of_code</text>
  
  <!-- Step 2 Nodes -->
  <rect x="420" y="60" width="80" height="30" rx="5" class="node"/>
  <text x="460" y="80" class="text">Employees</text>
  
  <rect x="530" y="60" width="60" height="30" rx="5" class="cte-node"/>
  <text x="560" y="80" class="text">JOIN</text>
  
  <rect x="620" y="60" width="100" height="30" rx="5" class="result-node"/>
  <text x="670" y="80" class="text">Correct Results</text>
  
  <!-- Arrows -->
  <path d="M150 85 L200 85" class="arrow"/>
  <path d="M500 75 L530 75" class="arrow"/>
  <path d="M270 60 Q270 30 560 30 Q560 60 560 60" class="arrow"/>
  <path d="M590 75 L620 75" class="arrow"/>
  
  <!-- Bottom explanation -->
  <rect x="50" y="180" width="700" height="80" rx="5" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="400" y="205" class="step-title" text-anchor="middle">Fan-out Prevention in Action</text>
  <text x="60" y="225" fill="#92400e" font-family="Arial, sans-serif" font-size="12px">
    Without CTE: Employees × Productivity records = Data multiplication (fan-out)
  </text>
  <text x="60" y="245" fill="#92400e" font-family="Arial, sans-serif" font-size="12px">
    With CTE: Pre-aggregate Productivity first, then JOIN = Accurate metrics
  </text>
</svg>